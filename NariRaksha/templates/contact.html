<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - NariRaksha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='contact.css') }}">
</head>
<body>

<header>
    <a href="{{ url_for('home') }}" class="logo">NariRaksha</a>
    <nav>
    
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('features') }}">Features</a>
    <a href="{{ url_for('tips') }}">Safety Tips</a>
    <a href="{{ url_for('contact') }}">Contact</a>
    <a href="{{ url_for('logout') }}">Logout</a>

    </nav>
</header>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<main class="contact-page">
    <section class="contact-section">
        <h1>Contact Us</h1>
        <p>Have questions or feedback? Reach out to us and we’ll get back to you promptly.</p>

        <form action="#" method="post" class="contact-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Your email address" required>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Subject" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your message..." rows="6" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 NariRaksha. All rights reserved.</p>
</footer>

</body>
</html>
